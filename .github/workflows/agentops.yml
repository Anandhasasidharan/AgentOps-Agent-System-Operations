name: AgentOps CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  IMAGE_REPOSITORY: asd492/agentops
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test:
    name: Test all services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - path: agent-circuit-breaker
            module: circuit_breaker
          - path: agent-chaos-toolkit
            module: chaos_toolkit
          - path: agent-slo-platform
            module: agent_slo
          - path: agentops-sdk
            module: agentops
          - path: agentops-events
            module: agentops_events
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e agentops-core/
          pip install -e agentops-events/
          pip install -e ${{ matrix.service.path }}/
          pip install -e ${{ matrix.service.path }}/"[dev]"

      - name: Run tests
        run: |
          cd ${{ matrix.service.path }}
          python -m pytest -x --cov=${{ matrix.service.module }} --cov-report=term-missing

  lint:
    name: Lint and type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install all services
        run: |
          pip install -e agentops-core/
          pip install -e agentops-events/
          pip install -e agent-circuit-breaker/"[dev]"
          pip install -e agent-chaos-toolkit/"[dev]"
          pip install -e agent-slo-platform/"[dev]"
          pip install -e dashboard/"[dev]"
          pip install -e agentops-sdk/"[dev]"
          pip install -e agent-gateway/"[dev]"

      - name: Ruff
        run: ruff check agentops-events/src agent-gateway/src agent-circuit-breaker/src agent-chaos-toolkit/src agent-slo-platform/src dashboard/src agentops-sdk/src

      - name: Black check
        run: black --check agentops-events/src agent-gateway/src agent-circuit-breaker/src agent-chaos-toolkit/src agent-slo-platform/src dashboard/src agentops-sdk/src

  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push images
        run: |
          for service in agent-circuit-breaker agent-chaos-toolkit agent-slo-platform dashboard agent-gateway; do
            docker build \
              --build-arg SERVICE=$service \
              -t ${{ env.IMAGE_REPOSITORY }}/$service:${{ env.IMAGE_TAG }} \
              -t ${{ env.IMAGE_REPOSITORY }}/$service:latest \
              .
            docker push ${{ env.IMAGE_REPOSITORY }}/$service:${{ env.IMAGE_TAG }}
            docker push ${{ env.IMAGE_REPOSITORY }}/$service:latest
          done

  deploy-infra:
    name: Deploy infrastructure (Terraform)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        run: terraform plan -var="db_password=${{ secrets.DB_PASSWORD }}" -var="image_tag=${{ env.IMAGE_TAG }}"

      - name: Terraform apply
        run: terraform apply -auto-approve -var="db_password=${{ secrets.DB_PASSWORD }}" -var="image_tag=${{ env.IMAGE_TAG }}"

  deploy-app:
    name: Deploy application (Helm)
    runs-on: ubuntu-latest
    needs: [deploy-infra]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure K8s context
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name agentops-cluster --region us-east-1

      - name: Deploy Helm chart
        run: |
          helm upgrade --install agentops ./helm/agentops \
            --set image.repository=${{ env.IMAGE_REPOSITORY }} \
            --set image.tag=${{ env.IMAGE_TAG }} \
            --set apiKey=${{ secrets.API_KEY }} \
            --set database.externalUrl=${{ secrets.DATABASE_URL }}

  smoke:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: [deploy-app]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install SDK
        run: pip install -e agentops-core/ && pip install -e agentops-sdk/

      - name: Smoke test
        run: |
          python -c "
          import asyncio
          from agentops import AgentOpsSDK
          async def main():
              sdk = AgentOpsSDK(api_key='${{ secrets.API_KEY }}', slo_url='https://${{ vars.DOMAIN }}:8000', cb_url='https://${{ vars.DOMAIN }}:8001', chaos_url='https://${{ vars.DOMAIN }}:8002')
              status = await sdk.get_status()
              print(f'SLO status: {len(status)} entries')
              score = await sdk.get_resilience_score()
              print(f'Resilience: {score[\"avg_resilience_score\"]}')
              await sdk.close()
          asyncio.run(main())
          "
