name: AgentOps CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  IMAGE_REPOSITORY: asd492/agentops
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test:
    name: Test all services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - path: agent-circuit-breaker
            module: circuit_breaker
          - path: agent-chaos-toolkit
            module: chaos_toolkit
          - path: agent-slo-platform
            module: agent_slo
          - path: agentops-sdk
            module: agentops
          - path: agentops-events
            module: agentops_events
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e agentops-core/
          pip install -e agentops-events/
          pip install -e ${{ matrix.service.path }}/
          pip install -e ${{ matrix.service.path }}/"[dev]"

      - name: Run tests
        run: |
          cd ${{ matrix.service.path }}
          python -m pytest -x --cov=${{ matrix.service.module }} --cov-report=term-missing

  lint:
    name: Lint and type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install all services
        run: |
          pip install -e agentops-core/
          pip install -e agentops-events/
          pip install -e agent-circuit-breaker/"[dev]"
          pip install -e agent-chaos-toolkit/"[dev]"
          pip install -e agent-slo-platform/"[dev]"
          pip install -e dashboard/"[dev]"
          pip install -e agentops-sdk/"[dev]"
          pip install -e agent-gateway/"[dev]"

      - name: Ruff
        run: ruff check agentops-events/src agent-gateway/src agent-circuit-breaker/src agent-chaos-toolkit/src agent-slo-platform/src dashboard/src agentops-sdk/src

      - name: Black check
        run: black --check agentops-events/src agent-gateway/src agent-circuit-breaker/src agent-chaos-toolkit/src agent-slo-platform/src dashboard/src agentops-sdk/src

  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push images
        run: |
          for service in agent-circuit-breaker agent-chaos-toolkit agent-slo-platform dashboard agent-gateway; do
            docker build \
              --build-arg SERVICE=$service \
              -t ${{ env.IMAGE_REPOSITORY }}:$service-${{ env.IMAGE_TAG }} \
              -t ${{ env.IMAGE_REPOSITORY }}:$service-latest \
              .
            docker push ${{ env.IMAGE_REPOSITORY }}:$service-${{ env.IMAGE_TAG }}
            docker push ${{ env.IMAGE_REPOSITORY }}:$service-latest
          done


