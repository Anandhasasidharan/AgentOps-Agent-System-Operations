services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agentops
      POSTGRES_PASSWORD: agentops
      POSTGRES_DB: circuit_breaker
    ports:
      - "5432:5432"
    volumes:
      - cb_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentops -d circuit_breaker"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      target: dev
    environment:
      DATABASE_URL: postgresql+asyncpg://agentops:agentops@db:5432/circuit_breaker
      REDIS_URL: redis://redis:6379/0
      API_KEY: dev-api-key
      LOG_LEVEL: info
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests

volumes:
  cb_pgdata:
