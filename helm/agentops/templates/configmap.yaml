apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agentops.fullname" . }}-config
  labels: {{- include "agentops.labels" . | nindent 4 }}
data:
  API_KEY: {{ .Values.apiKey | quote }}
  DB_URL: {{ include "agentops.databaseUrl" . | quote }}
  OTEL_ENDPOINT: {{ include "agentops.otelEndpoint" . | quote }}
